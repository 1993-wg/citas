<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- CSS unificado -->
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
  <!-- Encabezado -->
  <header class="fondo-blanco borde-inferior sombra-azul py-3">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="logo">
        <img src="../IMAGENES/logo.jpg" alt="Logo" width="200" onerror="this.src='https://via.placeholder.com/200';">
      </div>
      <nav class="d-flex gap-2">
        <a href="#" class="btn btn-outline-primary">Home</a>
        <a href="#" class="btn btn-outline-primary">Citas</a>
        <a href="#" class="btn btn-outline-primary">Planes</a>
        <a href="#" class="btn btn-outline-primary">Cedes</a>
        <a href="#" class="btn btn-outline-primary">Certificados</a>
      </nav>
    </div>
  </header>

  <!-- Sección de Inicio de Sesión -->
  <section class="seccion-inicio">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6">
          <form id="frmLogin" class="formulario-inicio fondo-blanco sombra-suave p-4">
            <h2 class="tarjeta-titulo text-center mb-4">Iniciar sesión</h2>
            <div class="mb-3">
              <label for="txtEmailLogin" class="form-label">Correo Electrónico</label>
              <input type="email" class="form-control" id="txtEmailLogin" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="mb-3">
              <label for="txtPasswordLogin" class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="txtPasswordLogin" placeholder="Contraseña" required>
            </div>
            <div class="text-end mb-3">
              <a href="#!" class="texto-olvidado">¿Has olvidado tu contraseña?</a>
            </div>
            <button type="submit" id="btnLogin" class="btn btn-primario w-100">Iniciar sesión</button>
            <p class="text-center mt-3">
              ¿Aún no tienes una cuenta? <a href="registro_usuario.html" class="texto-crear-cuenta">Crea una cuenta</a>
            </p>
            <div class="texto-pie text-center mt-4">
              © 2025 MEDISSOFF EXCELENT <span class="separador">|</span> <a href="#!" class="texto-ayuda">Ayuda</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Redes sociales -->
  <footer class="fondo-azul-oscuro">
    <div class="container">
      <div class="iconos-redes d-flex justify-content-center mt-3">
        <a href="#" target="_blank" title="WhatsApp"><i class="bi bi-whatsapp"></i></a>
        <a href="#" target="_blank" title="Facebook"><i class="bi bi-facebook"></i></a>
        <a href="#" target="_blank" title="Instagram"><i class="bi bi-instagram"></i></a>
        <a href="#" target="_blank" title="Twitter"><i class="bi bi-twitter"></i></a>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Auth JS -->
  <script type="module" src="../JS/auth.js"></script>
</body>
</html>
