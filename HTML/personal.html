<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Personal - MediCita</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
  <header class="fondo-blanco borde-inferior sombra-azul py-3">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="logo">
        <a href="../index.html">
          <img src="../IMAGENES/logo.jpg" alt="Logo" width="200" onerror="this.src='https://via.placeholder.com/200';">
        </a>
      </div>
      <nav class="d-flex gap-2 nav-responsiva">
        <a href="../index.html" class="btn btn-outline-primary">Home</a>
        <a href="gestion de citas.html" class="btn btn-primario mx-2 font-weight-bold">AGENDAR CITA</a>
        <a href="pacientes.html" class="btn btn-outline-primary">Pacientes</a>
        <a href="medicos.html" class="btn btn-outline-primary">Médicos</a>
        <a href="personal.html" class="btn btn-outline-primary active">Personal</a>
      </nav>
    </div>
  </header>

  <div class="container my-5 form-container">
    <div class="tarjeta fondo-blanco sombra-azul p-4">
      <h3 class="tarjeta-titulo mb-4 text-center">Registro Personal</h3>
      
      <!-- Test CP_TRB_03: Solo Nombre es requerido, el resto es opcional -->
      <form id="frmPersonal">
        <div class="row">
          <div class="col-md-12 mb-3">
            <label for="txtNombrePersonal" class="form-label">Nombre del Trabajador</label>
            <input type="text" id="txtNombrePersonal" name="nombre" class="form-control" required placeholder="Ej. Carlos Pérez">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="txtCargo" class="form-label">Cargo (Opcional)</label>
            <input type="text" id="txtCargo" name="cargo" class="form-control" placeholder="Ej. Recepcionista">
          </div>
          <div class="col-md-6 mb-3">
            <label for="txtDepartamento" class="form-label">Departamento (Opcional)</label>
            <input type="text" id="txtDepartamento" name="departamento" class="form-control" placeholder="Ej. Administración">
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" id="btnCancelarPersonal" class="btn btn-outline-secondary">Cancelar</button>
          <button type="submit" id="btnGuardarPersonal" class="btn btn-primario">Guardar Personal</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="fondo-azul-oscuro mt-auto">
    <div class="container">
      <div class="iconos-redes d-flex justify-content-center mt-3">
        <a href="#" target="_blank" title="WhatsApp"><i class="bi bi-whatsapp"></i></a>
        <a href="#" target="_blank" title="Facebook"><i class="bi bi-facebook"></i></a>
        <a href="#" target="_blank" title="Instagram"><i class="bi bi-instagram"></i></a>
      </div>
    </div>
  </footer>

  <script type="module" src="../JS/formularios.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
