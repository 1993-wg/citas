<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Pacientes - MediCita</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
  <!-- Encabezado -->
  <header class="fondo-blanco borde-inferior sombra-azul py-3">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="logo">
        <a href="../index.html">
          <img src="../IMAGENES/logo.jpg" alt="Logo" width="200" onerror="this.src='https://via.placeholder.com/200';">
        </a>
      </div>
      <nav class="d-flex gap-2 nav-responsiva">
        <a href="../index.html" class="btn btn-outline-primary">Home</a>
        <a href="gestion de citas.html" class="btn btn-primario mx-2 font-weight-bold">AGENDAR CITA</a>
        <a href="pacientes.html" class="btn btn-outline-primary active">Pacientes</a>
        <a href="medicos.html" class="btn btn-outline-primary">Médicos</a>
        <a href="personal.html" class="btn btn-outline-primary">Personal</a>
      </nav>
    </div>
  </header>

  <div class="container my-5 form-container">
    <div class="tarjeta fondo-blanco sombra-azul p-4">
      <h3 class="tarjeta-titulo mb-4 text-center">Nuevo Paciente</h3>
      
      <!-- Test CP_PAC_01 y CP_GEN_04: Todos los campos required -->
      <!-- Test CP_CAN_05: Botón cancelar -->
      <form id="frmPaciente">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="txtNombres" class="form-label">Nombres</label>
            <input type="text" id="txtNombres" name="nombres" class="form-control" required placeholder="Ej: Juan">
          </div>
          <div class="col-md-6 mb-3">
            <label for="txtApellidos" class="form-label">Apellidos</label>
            <input type="text" id="txtApellidos" name="apellidos" class="form-control" required placeholder="Ej: Pérez">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="txtDocumento" class="form-label">Documento</label>
            <input type="text" id="txtDocumento" name="documento" class="form-control" required placeholder="Número de documento">
          </div>
          <div class="col-md-6 mb-3">
            <label for="txtFechaNac" class="form-label">Fecha de Nacimiento</label>
            <input type="date" id="txtFechaNac" name="fecha_nacimiento" class="form-control" required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="txtTelefono" class="form-label">Teléfono</label>
            <input type="tel" id="txtTelefono" name="telefono" class="form-control" required placeholder="Número de contacto">
          </div>
          <div class="col-md-6 mb-3">
            <label for="txtEmail" class="form-label">Correo Electrónico</label>
            <input type="email" id="txtEmail" name="email" class="form-control" required placeholder="ejemplo@correo.com">
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" id="btnCancelarPaciente" class="btn btn-outline-secondary">Cancelar</button>
          <button type="submit" id="btnGuardarPaciente" class="btn btn-primario">Guardar Paciente</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="fondo-azul-oscuro mt-auto">
    <div class="container">
      <div class="iconos-redes d-flex justify-content-center mt-3">
        <a href="#" target="_blank" title="WhatsApp"><i class="bi bi-whatsapp"></i></a>
        <a href="#" target="_blank" title="Facebook"><i class="bi bi-facebook"></i></a>
        <a href="#" target="_blank" title="Instagram"><i class="bi bi-instagram"></i></a>
      </div>
    </div>
  </footer>

  <script type="module" src="../JS/formularios.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
