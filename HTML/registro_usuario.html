<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - MediCita</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
  <header class="fondo-blanco borde-inferior sombra-azul py-3">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="logo">
        <a href="../index.html"><img src="../IMAGENES/logo.jpg" alt="Logo" width="200" onerror="this.src='https://via.placeholder.com/200';"></a>
      </div>
      <nav class="d-flex gap-2 nav-responsiva align-items-center flex-wrap">
        <a href="../index.html" class="btn btn-outline-primary">Home</a>
      </nav>
    </div>
  </header>

  <section class="seccion-inicio">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6">
          <form id="frmRegistro" class="formulario-inicio fondo-blanco sombra-suave p-4">
            <h2 class="tarjeta-titulo text-center mb-4">Crear Cuenta</h2>
            <div class="mb-3">
              <label for="txtEmailReg" class="form-label">Correo Electrónico</label>
              <input type="email" class="form-control" id="txtEmailReg" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="mb-3">
              <label for="txtPasswordReg" class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="txtPasswordReg" placeholder="Crea una contraseña (mínimo 6 caracteres)" required minlength="6">
            </div>
            <button type="submit" id="btnRegistrar" class="btn btn-primario w-100">Registrarse</button>
            <p class="text-center mt-3">
              ¿Ya tienes una cuenta? <a href="login.html" class="texto-crear-cuenta">Inicia sesión</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </section>

  <script type="module" src="../JS/auth.js"></script>
</body>
</html>
